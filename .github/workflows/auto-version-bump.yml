name: Auto Version Bump

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump level to simulate (dry-run only — nothing is committed or pushed)"
        required: true
        type: choice
        options:
          - major
          - minor
          - none
        default: minor

permissions:
  contents: write
  pull-requests: read

jobs:
  validate-bump:
    # This job validates PR checkbox state early, before merge. It fails fast
    # if multiple or no version bumps are selected, preventing invalid merges.
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate bump selection
        run: |
          set -euo pipefail
          python .github/scripts/determine_bump.py "${{ github.event.pull_request.body }}"

  version-bump:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Resolve bump type
        id: bump
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ inputs.bump_type }}"
          else
            BUMP_TYPE=$(python .github/scripts/determine_bump.py "${{ github.event.pull_request.body }}")
          fi
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "Version bump type: $BUMP_TYPE"

      - name: Install bump-my-version
        run: |
          set -euo pipefail
          pip install bump-my-version

      # --- Dry-run path (workflow_dispatch only) ---

      - name: Dry-run bump
        if: github.event_name == 'workflow_dispatch' && steps.bump.outputs.type != 'none'
        run: |
          set -euo pipefail
          echo "::notice::Dry-run/simulation mode — no commits, tags, or pushes will be made."
          bump-my-version bump --config-file pyproject.toml --dry-run --verbose ${{ steps.bump.outputs.type }}

      - name: Dry-run no bump
        if: github.event_name == 'workflow_dispatch' && steps.bump.outputs.type == 'none'
        run: |
          set -euo pipefail
          echo "::notice::Dry-run/simulation mode — no version bump requested (none selected)."
          echo "No version bump requested"

      # --- Merged-PR real bump path ---

      - name: No version bump
        if: github.event_name == 'pull_request' && steps.bump.outputs.type == 'none'
        run: |
          set -euo pipefail
          echo "No version bump requested"

      - name: Configure git
        if: github.event_name == 'pull_request' && steps.bump.outputs.type != 'none'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push
        if: github.event_name == 'pull_request' && steps.bump.outputs.type != 'none'
        run: |
          set -euo pipefail
          bump-my-version bump --config-file pyproject.toml --commit --tag ${{ steps.bump.outputs.type }}

          # Critical: Verify that bump-my-version actually modified the version file.
          # We've observed cases where bump claims success but pyproject.toml was untouched,
          # leading to released packages with stale versions.
          if ! git diff-tree --no-commit-id --name-only -r HEAD | grep -qx 'pyproject.toml'; then
            echo "::error::Version bump commit did not update pyproject.toml. Aborting tag push."
            exit 1
          fi

          git push --follow-tags

          # Paranoia check: verify the tag actually reached the remote.
          # Prevents 'tag disappeared' incidents.
          git fetch origin --tags
          if ! git describe --tags --exact-match $(git rev-parse HEAD); then
            echo "::error::Tag push verification failed — tag not found on remote."
            exit 1
          fi
