name: Auto Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Get PR information
        id: pr
        uses: 8BitJonny/gh-get-current-pr@4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version bump type
        id: bump
        if: steps.pr.outputs.pr_number != ''
        run: |
          set -euo pipefail
          if ! BUMP_TYPE=$(python .github/scripts/determine_bump.py "${{ steps.pr.outputs.pr_body }}"); then
            echo "::error::determine_bump.py failed to parse PR checkbox selection."
            exit 1
          fi
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "Version bump type: $BUMP_TYPE"

      - name: Install bump-my-version
        if: steps.pr.outputs.pr_number != ''
        run: pip install bump-my-version

      - name: Configure git
        if: steps.pr.outputs.pr_number != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (No bump)
        if: steps.bump.outputs.type == 'none'
        run: echo "No version bump requested"

      - name: Bump version (Major)
        if: steps.bump.outputs.type == 'major'
        run: |
          set -euo pipefail
          bump-my-version bump --config-file pyproject.toml --commit --tag major
          git diff-tree --no-commit-id --name-only -r HEAD | grep -qx 'pyproject.toml' || {
            echo "::error::Version bump commit did not update pyproject.toml."
            exit 1
          }
          git push --follow-tags

      - name: Bump version (Minor)
        if: steps.bump.outputs.type == 'minor'
        run: |
          set -euo pipefail
          bump-my-version bump --config-file pyproject.toml --commit --tag minor
          git diff-tree --no-commit-id --name-only -r HEAD | grep -qx 'pyproject.toml' || {
            echo "::error::Version bump commit did not update pyproject.toml."
            exit 1
          }
          git push --follow-tags
