name: Auto Version Bump

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump level to simulate (dry-run only — nothing is committed or pushed)"
        required: true
        type: choice
        options:
          - major
          - minor
          - none
        default: minor

permissions:
  contents: write
  pull-requests: read

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Get PR information
        id: pr
        if: github.event_name == 'push'
        uses: 8BitJonny/gh-get-current-pr@4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve bump type
        id: bump
        if: github.event_name == 'workflow_dispatch' || steps.pr.outputs.pr_number != ''
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ inputs.bump_type }}"
          else
            BUMP_TYPE=$(python .github/scripts/determine_bump.py "${{ steps.pr.outputs.pr_body }}")
          fi
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "Version bump type: $BUMP_TYPE"

      - name: Install bump-my-version
        if: steps.bump.outputs.type != ''
        run: pip install bump-my-version

      # Manual (workflow_dispatch) dry-run steps — no commit, tag, or push

      - name: Dry run major bump
        if: github.event_name == 'workflow_dispatch' && steps.bump.outputs.type == 'major'
        run: bump-my-version bump --config-file pyproject.toml --dry-run --verbose major

      - name: Dry run minor bump
        if: github.event_name == 'workflow_dispatch' && steps.bump.outputs.type == 'minor'
        run: bump-my-version bump --config-file pyproject.toml --dry-run --verbose minor

      - name: Dry run no bump
        if: github.event_name == 'workflow_dispatch' && steps.bump.outputs.type == 'none'
        run: echo "No version bump requested (none selected)"

      # Push-to-main steps — real bump, commit, tag, and push

      - name: Configure git
        if: github.event_name == 'push' && steps.bump.outputs.type != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (No bump)
        if: github.event_name == 'push' && steps.bump.outputs.type == 'none'
        run: echo "No version bump requested"

      - name: Bump version (Major)
        if: github.event_name == 'push' && steps.bump.outputs.type == 'major'
        run: |
          bump-my-version bump --config-file pyproject.toml --commit --tag major
          git diff --name-only HEAD^ HEAD | grep -q pyproject.toml || { echo "ERROR: pyproject.toml was not modified by version bump"; exit 1; }
          git push --follow-tags

      - name: Bump version (Minor)
        if: github.event_name == 'push' && steps.bump.outputs.type == 'minor'
        run: |
          bump-my-version bump --config-file pyproject.toml --commit --tag minor
          git diff --name-only HEAD^ HEAD | grep -q pyproject.toml || { echo "ERROR: pyproject.toml was not modified by version bump"; exit 1; }
          git push --follow-tags
