name: Validate PR Requirements

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  checks: write

jobs:
  validate-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate version bump selection
        id: validate
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          PR_BODY=$(echo "$PR_BODY" | tr -d '\r')
          BUMP_RESULT=$(python .github/scripts/determine_bump.py "$PR_BODY")
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            echo "Version bump checkbox validation failed"
            exit 1
          else
            echo "Version bump checkbox is properly selected: $BUMP_RESULT"
            
            # Get current version from pyproject.toml
            CURRENT_VERSION=$(grep -E '^version = "' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            echo "Current version: $CURRENT_VERSION"
            
            # Calculate new version based on bump type
            if [ "$BUMP_RESULT" == "none" ]; then
              echo "New version: $CURRENT_VERSION (no change)"
            elif [ "$BUMP_RESULT" == "minor" ]; then
              # Parse year.major.minor format
              YEAR=$(echo $CURRENT_VERSION | cut -d. -f1)
              MAJOR=$(echo $CURRENT_VERSION | cut -d. -f2)
              MINOR=$(echo $CURRENT_VERSION | cut -d. -f3)
              NEW_MINOR=$((10#$MINOR + 1))
              NEW_VERSION=$(printf "%s.%02d.%02d" "$YEAR" "$((10#$MAJOR))" "$NEW_MINOR")
              echo "New version: $NEW_VERSION"
            elif [ "$BUMP_RESULT" == "major" ]; then
              YEAR=$(echo $CURRENT_VERSION | cut -d. -f1)
              MAJOR=$(echo $CURRENT_VERSION | cut -d. -f2)
              NEW_MAJOR=$((10#$MAJOR + 1))
              NEW_VERSION=$(printf "%s.%02d.00" "$YEAR" "$NEW_MAJOR")
              echo "New version: $NEW_VERSION"
            fi
            exit 0
          fi

      - name: Comment on PR if validation fails
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'PR Validation Failed\n\nPlease select exactly ONE version bump option in the PR template:\n- **No version bump** - Documentation or refactoring\n- **Minor version** - Bug fix or patch (increments year.0.x)\n- **Major version** - New feature (increments year.x.0)'
            })